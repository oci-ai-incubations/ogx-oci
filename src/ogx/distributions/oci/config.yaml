version: 2
distro_name: oci
apis:
- batches
- file_processors
- files
- inference
- responses
- safety
- tool_runtime
- vector_io
providers:
  inference:
  - provider_id: oci
    provider_type: remote::oci
    config:
      oci_auth_type: ${env.OCI_AUTH_TYPE:=instance_principal}
      oci_config_file_path: ${env.OCI_CONFIG_FILE_PATH:=~/.oci/config}
      oci_config_profile: ${env.OCI_CLI_PROFILE:=DEFAULT}
      oci_region: ${env.OCI_REGION:=us-ashburn-1}
      oci_compartment_id: ${env.OCI_COMPARTMENT_OCID:=}
  vector_io:
  - provider_id: faiss
    provider_type: inline::faiss
    config:
      persistence:
        namespace: vector_io::faiss
        backend: kv_default
  - provider_id: sqlite-vec
    provider_type: inline::sqlite-vec
    config:
      db_path: ${env.SQLITE_STORE_DIR:=~/.ogx/distributions/oci}/sqlite_vec.db
      persistence:
        namespace: vector_io::sqlite_vec
        backend: kv_default
  - provider_id: oci
    provider_type: remote::oci
    config:
      conn_str: ${env.OCI26AI_CONNECTION_STRING}
      user: ${env.OCI26AI_USER}
      password: ${env.OCI26AI_PASSWORD}
      vector_datatype: ${env.OCI26AI_VECTOR_DATATYPE:=FLOAT32}
      persistence:
        namespace: vector_io::oci26ai
        backend: kv_default
  safety:
  - provider_id: code-scanner
    provider_type: inline::code-scanner
  responses:
  - provider_id: builtin
    provider_type: inline::builtin
    config:
      persistence:
        agent_state:
          namespace: agents
          backend: kv_default
        responses:
          table_name: responses
          backend: sql_default
          max_write_queue_size: 10000
          num_writers: 4
  tool_runtime:
  - provider_id: brave-search
    provider_type: remote::brave-search
    config:
      api_key: ${env.BRAVE_SEARCH_API_KEY:=}
      max_results: 3
  - provider_id: tavily-search
    provider_type: remote::tavily-search
    config:
      api_key: ${env.TAVILY_SEARCH_API_KEY:=}
      max_results: 3
  - provider_id: file-search
    provider_type: inline::file-search
  - provider_id: model-context-protocol
    provider_type: remote::model-context-protocol
  files:
  - provider_id: builtin-files
    provider_type: inline::localfs
    config:
      storage_dir: ${env.FILES_STORAGE_DIR:=~/.ogx/distributions/oci/files}
      metadata_store:
        table_name: files_metadata
        backend: sql_default
  - provider_id: s3-files
    provider_type: remote::s3
    config:
      bucket_name: ${env.S3_BUCKET_NAME}
      region: ${env.AWS_REGION:=us-east-1}
      aws_access_key_id: ${env.AWS_ACCESS_KEY_ID:=}
      aws_secret_access_key: ${env.AWS_SECRET_ACCESS_KEY:=}
      endpoint_url: ${env.S3_ENDPOINT_URL:=}
      auto_create_bucket: ${env.S3_AUTO_CREATE_BUCKET:=false}
      metadata_store:
        table_name: s3_files_metadata
        backend: sql_default
  file_processors:
  - provider_id: auto
    provider_type: inline::auto
  - provider_id: docling
    provider_type: inline::docling
    config:
      default_chunk_size_tokens: 800
      default_chunk_overlap_tokens: 400
  batches:
  - provider_id: reference
    provider_type: inline::reference
    config:
      kvstore:
        namespace: batches
        backend: kv_default
storage:
  backends:
    kv_default:
      type: kv_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.ogx/distributions/oci}/kvstore.db
    sql_default:
      type: sql_sqlite
      db_path: ${env.SQLITE_STORE_DIR:=~/.ogx/distributions/oci}/sql_store.db
  stores:
    metadata:
      namespace: registry
      backend: kv_default
    inference:
      table_name: inference_store
      backend: sql_default
      max_write_queue_size: 10000
      num_writers: 4
    conversations:
      table_name: openai_conversations
      backend: sql_default
    prompts:
      namespace: prompts
      backend: kv_default
    connectors:
      namespace: connectors
      backend: kv_default
registered_resources:
  models: []
  shields: []
  vector_dbs: []
server:
  port: 8321
